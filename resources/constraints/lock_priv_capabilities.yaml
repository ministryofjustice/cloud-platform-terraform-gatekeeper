apiVersion: constraints.gatekeeper.sh/v1beta1
kind: LockPrivCapabilities
metadata:
  name: lockprivcapabilities
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    namespaces: [
      "cert-manager",
      "gatekeeper-system",
      "kuberos",
      "logging",
      "monitoring",
      "smoketest-psa-*",
      "trivy-system",
      "amazon-guardduty"
      ]
    excludedNamespaces: [
      "kube-system",
      "kube-node-lease",
      "kube-public",
      ]
  parameters:
    allowedCapabilities: ["NET_BIND_SERVICE","NET_ADMIN"]
    requiredDropCapabilities: ["NET_RAW"]