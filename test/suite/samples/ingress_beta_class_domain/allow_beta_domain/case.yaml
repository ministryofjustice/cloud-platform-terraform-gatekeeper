kind: AdmissionReview
apiVersion: admission.k8s.io/v1beta1
request:
  kind:
    group: networking.k8s.io
    version: v1
    kind: Ingress

  operation: "CREATE"

  name: ing-beta-allow

  namespace: default

  object:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: ing-beta-allow
      namespace: default
    spec:
      ingressClassName: beta
      rules:
      - host: my-app.beta.cloud-platform.service.justice.gov.uk
        http:
          paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: nginx
                port:
                  number: 80
